name: Build

on:
  push:
    branches: [ nextgen ]
  pull_request:
    branches: [ nextgen ]

permissions:
  contents: write
  pull-requests: write

jobs:
  extract-versions:
    runs-on: ubuntu-latest
    outputs:
      lb_version: ${{ steps.versions.outputs.lb_version }}
      minecraft_version: ${{ steps.versions.outputs.minecraft_version }}
      loader_version: ${{ steps.versions.outputs.loader_version }}
      fabricapi_version: ${{ steps.versions.outputs.fabricapi_version }}
      kotlin_version: ${{ steps.versions.outputs.kotlin_version }}
      fabric_kotlin_version: ${{ steps.versions.outputs.fabric_kotlin_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract versions
        id: versions
        run: |
          set -euo pipefail

          function gradleprop {
            local key="$1"
            local value=$(grep "^${key}=" gradle.properties | head -n1 | cut -d'=' -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$value" ]; then
              echo "[ERROR] gradleprop: '${key}' not found or blank in gradle.properties" >&2
              exit 1
            fi
            echo "$value"
          }

          function tomlprop {
            local key="$1"
            local value=$(grep "^${key}[[:space:]]*=" gradle/libs.versions.toml | head -n1 | sed -n 's/^[^=]*=[[:space:]]*"\([^"]*\)".*/\1/p')
            if [ -z "$value" ]; then
              echo "[ERROR] tomlprop: '${key}' not found or blank in gradle/libs.versions.toml" >&2
              exit 1
            fi
            echo "$value"
          }

          LB_VERSION=$(gradleprop 'mod_version')
          MINECRAFT_VERSION=$(tomlprop 'minecraft')
          LOADER_VERSION=$(tomlprop 'fabric-loader')
          FABRICAPI_VERSION=$(tomlprop 'fabric-api')
          KOTLIN_VERSION=$(tomlprop 'kotlin')
          FABRIC_KOTLIN_VERSION=$(tomlprop 'fabric-kotlin')

          echo "lb_version=$LB_VERSION" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$MINECRAFT_VERSION" >> "$GITHUB_OUTPUT"
          echo "loader_version=$LOADER_VERSION" >> "$GITHUB_OUTPUT"
          echo "fabricapi_version=$FABRICAPI_VERSION" >> "$GITHUB_OUTPUT"
          echo "kotlin_version=$KOTLIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "fabric_kotlin_version=$FABRIC_KOTLIN_VERSION" >> "$GITHUB_OUTPUT"

          echo "LiquidBounce: $LB_VERSION"
          echo "Minecraft: $MINECRAFT_VERSION"
          echo "Fabric Loader: $LOADER_VERSION"
          echo "Fabric API: $FABRICAPI_VERSION"
          echo "Kotlin: $KOTLIN_VERSION"
          echo "Fabric Kotlin: $FABRIC_KOTLIN_VERSION"

  build:
    runs-on: ubuntu-latest
    needs: extract-versions
    if: github.ref == 'refs/heads/nextgen'
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setting up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '21'
          cache: 'gradle'
      - name: Grant permissions to src-theme
        run: sudo chmod -R 777 src-theme
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Export DJL SavedModels
        run: |
          set -x
          ./gradlew exportDjlSavedModels --no-daemon --stacktrace
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install converter dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tf2onnx onnx onnxruntime tensorflow
      - name: Convert SavedModels -> ONNX
        run: |
          ./scripts/convert_saved_models.py --saved build/exports/savedmodels --out src/main/resources/resources/liquidbounce/models
      - name: Upload export debug dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-debug-${{ github.run_id }}
          path: build/exports/export-debug
      - name: Build
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          mkdir -p build/logs
          ./gradlew build -x test -x detekt 2>&1 | tee build/logs/gradle.log

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log-${{ github.run_id }}
          path: build/logs/gradle.log
      - name: Find JAR artifact
        id: find-jar
        run: |
          set -euo pipefail
          cd build/libs
          JAR=$(find . -maxdepth 1 -regex '.*liquidbounce-[0-9.]*\.jar' -printf '%f\n' | head -1)
          if [ -z "$JAR" ]; then
            echo "[ERROR] built jar not found in build/libs" >&2
            exit 1
          fi
          echo "jar_name=$JAR" >> "$GITHUB_OUTPUT"
          echo "Found JAR: $JAR"
      - name: Upload artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: liquidbounce-${{ needs.extract-versions.outputs.lb_version }}
          path: build/libs/${{ steps.find-jar.outputs.jar_name }}
          retention-days: 30

  verify-pr:
    runs-on: ubuntu-latest
    needs: extract-versions
    if: github.ref != 'refs/heads/nextgen'
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setting up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '21'
          cache: 'gradle'
      - name: Grant permissions to src-theme
        run: sudo chmod -R 777 src-theme
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        env:
          CI: true
        run: ./gradlew build
      - name: Upload SARIF to GitHub using the upload-sarif action
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: build/reports/detekt/detekt.sarif

  onnx:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/nextgen'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '21'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Export DJL SavedModels
        run: |
          set -x
          ./gradlew exportDjlSavedModels --no-daemon --stacktrace
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install converter dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tf2onnx onnx onnxruntime tensorflow
      - name: Convert SavedModels -> ONNX
        run: |
          ./scripts/convert_saved_models.py --saved build/exports/savedmodels
      - name: Show generated ONNX files
        run: |
          ls -la src/main/resources/resources/liquidbounce/models || true
      - name: Commit generated ONNX files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/resources/liquidbounce/models/*.onnx || true
          if git diff --cached --quiet; then
            echo "No ONNX changes to commit"
            exit 0
          fi
          git commit -m "chore(deeplearn): generate ONNX models from DJL .params [skip ci]"
      - name: Create Pull Request with generated ONNX files
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: nextgen
          branch: automated/onnx-generated-${{ github.run_id }}
          title: "chore(deeplearn): add generated ONNX models"
          body: |
            This automated PR adds ONNX model files generated from the DJL .params resources.
          labels: autogen
