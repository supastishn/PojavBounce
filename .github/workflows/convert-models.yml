name: Convert Models to ExecuTorch

on:
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'src/main/resources/resources/liquidbounce/models/*.params'
      - 'src/main/resources/scripts/executorch/*.py'
      - '.github/workflows/convert-models.yml'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install torch first
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install and configure mxnet with numpy <2.0
          pip install 'numpy<2.0'
          pip install mxnet
          # Install ONNX dependencies for model export
          pip install onnx onnxscript

          # Restore numpy <2.0 for mxnet (if it was upgraded)
          pip install --force-reinstall 'numpy<2.0'

          # Note: ExecuTorch has CMake requirements that make installation
          # on GitHub Actions challenging. Models will be converted using
          # TorchScript/ONNX formats instead, which are fully compatible
          # with mobile deployment. ExecuTorch conversion can be done locally
          # if needed using: executorch-exporter -m model.pt -o model.pte

      - name: Convert models to TorchScript and ONNX
        run: |
          # Use the simple conversion script that works without ExecuTorch
          python convert_models_simple.py

      - name: Install ExecuTorch
        run: |
          echo "Installing ExecuTorch..."
          pip install executorch --no-cache-dir
          echo "ExecuTorch installation complete"

      - name: Convert TorchScript to ExecuTorch (.pte)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_API_KEY: REDACTED
        run: |
          echo "Starting ExecuTorch conversion with enhanced logging..."
          python convert_to_executorch_with_logging.py
          echo "[GitHub Actions Log] ExecuTorch conversion completed" >&2

      - name: List converted models
        run: |
          echo "Converted models:"
          ls -lh converted_models/
          echo ""
          echo "All model files:"
          find converted_models -type f -exec ls -lh {} \; 2>/dev/null || true

      - name: Verify .pte files
        run: |
          echo "Verifying .pte file existence and sizes..."
          if ls converted_models/*.pte 1> /dev/null 2>&1; then
            echo "✓ .pte files found:"
            ls -lh converted_models/*.pte
          else
            echo "⚠️ No .pte files found"
            echo "Files in converted_models:"
            ls -la converted_models/
          fi

      - name: Upload converted models artifacts
        uses: actions/upload-artifact@v4
        with:
          name: converted-models
          path: converted_models/*
          retention-days: 90
          if-no-files-found: warn

      - name: Upload .pte artifacts specifically
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: executorch-models-pte
          path: converted_models/*.pte
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload conversion logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conversion-logs
          path: conversion_logs/*.log
          retention-days: 90
          if-no-files-found: ignore

      - name: Save GitHub Actions run info
        if: always()
        run: |
          mkdir -p conversion_logs
          echo "Run ID: ${{ github.run_id }}" >> conversion_logs/github_run_info.txt
          echo "Run Number: ${{ github.run_number }}" >> conversion_logs/github_run_info.txt
          echo "Actor: ${{ github.actor }}" >> conversion_logs/github_run_info.txt
          echo "Ref: ${{ github.ref }}" >> conversion_logs/github_run_info.txt
          cat conversion_logs/github_run_info.txt
