name: Convert Models to ExecuTorch

on:
  workflow_dispatch:
  push:
    branches:
      - nextgen

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install 'numpy<2.0'
          pip install mxnet
          pip install --force-reinstall 'numpy<2.0'
          pip install executorch

      - name: Create conversion directories
        run: |
          mkdir -p converted_models
          mkdir -p conversion_logs

      - name: Step 1: Convert .params to .pt (TorchScript)
        run: |
          python convert_models_simple.py 2>&1 | tee conversion_logs/step1_params_to_pt.log
          echo "Step 1 completed"
          ls -lh converted_models/

      - name: Step 2: Verify .pt files exist
        run: |
          echo "Checking for .pt files..."
          if ls converted_models/*.pt 1> /dev/null 2>&1; then
            echo "✓ .pt files found"
            ls -lh converted_models/*.pt
          else
            echo "✗ No .pt files found"
            exit 1
          fi

      - name: Step 3: Convert .pt to .pte (ExecuTorch)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python convert_to_executorch_with_logging.py 2>&1 | tee conversion_logs/step3_pt_to_pte.log
          echo "Step 3 completed"

      - name: Step 4: Verify .pte files exist
        run: |
          echo "Checking for .pte files..."
          if ls converted_models/*.pte 1> /dev/null 2>&1; then
            echo "✓ .pte files found:"
            ls -lh converted_models/*.pte
          else
            echo "✗ No .pte files found"
            echo "Files in converted_models:"
            ls -la converted_models/
            exit 1
          fi

      - name: List all converted models
        if: always()
        run: |
          echo "=== All converted models ==="
          find converted_models -type f -exec ls -lh {} \;

      - name: Upload .pte artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: executorch-models-pte
          path: converted_models/*.pte
          retention-days: 90
          if-no-files-found: error

      - name: Upload conversion logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conversion-logs
          path: conversion_logs/
          retention-days: 30
          if-no-files-found: warn
