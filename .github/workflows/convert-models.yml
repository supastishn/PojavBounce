name: Convert Models to ExecuTorch

on:
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'src/main/resources/resources/liquidbounce/models/*.params'
      - 'src/main/resources/scripts/executorch/*.py'
      - '.github/workflows/convert-models.yml'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install torch first
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Install and configure mxnet with numpy <2.0
          pip install 'numpy<2.0'
          pip install mxnet
          # Install ONNX dependencies for model export
          pip install onnx onnxscript

          # Restore numpy <2.0 for mxnet (if it was upgraded)
          pip install --force-reinstall 'numpy<2.0'

          # Note: ExecuTorch has CMake requirements that make installation
          # on GitHub Actions challenging. Models will be converted using
          # TorchScript/ONNX formats instead, which are fully compatible
          # with mobile deployment. ExecuTorch conversion can be done locally
          # if needed using: executorch-exporter -m model.pt -o model.pte

      - name: Convert models to TorchScript and ONNX
        run: |
          # Use the simple conversion script that works without ExecuTorch
          python convert_models_simple.py

      - name: List converted models
        run: |
          echo "Converted models:"
          ls -lh converted_models/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: converted-models
          path: converted_models/*
          retention-days: 90
