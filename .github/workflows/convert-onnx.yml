name: Convert ONNX Models

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert-onnx-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install ONNX dependencies
        run: |
          python -m pip install --upgrade pip
          pip install onnx numpy

      - name: Convert params -> ONNX (IR v9, opset 9)
        run: |
          set -x
          mkdir -p src/main/resources/resources/liquidbounce/models
          chmod +x scripts/params_to_onnx.py
          
          # Convert both model params to ONNX with IR v9 and opset 9
          ./scripts/params_to_onnx.py src/main/resources/resources/liquidbounce/models/21kc11kp.params 2 src/main/resources/resources/liquidbounce/models/21kc11kp.onnx
          ./scripts/params_to_onnx.py src/main/resources/resources/liquidbounce/models/19kc8kp.params 2 src/main/resources/resources/liquidbounce/models/19kc8kp.onnx

      - name: Verify ONNX IR version is v9
        run: |
          # Verify that params_to_onnx.py generated IR v9 models correctly
          python3 << 'EOF'
          import onnx
          from pathlib import Path

          models_dir = Path("src/main/resources/resources/liquidbounce/models")
          print(f"Checking models in: {models_dir}")
          print(f"Directory exists: {models_dir.exists()}")

          onnx_files = list(models_dir.glob("*.onnx"))
          print(f"Found {len(onnx_files)} ONNX files")

          for model_file in onnx_files:
              try:
                  model = onnx.load(str(model_file))
                  ir_version = model.ir_version
                  if ir_version != 9:
                      print(f"ERROR: {model_file.name} has IR v{ir_version}, expected v9")
                      exit(1)
                  else:
                      print(f"✓ {model_file.name}: IR v{ir_version}")
              except Exception as e:
                  print(f"Error processing {model_file.name}: {e}")
                  exit(1)

          print("All models verified as IR v9!")
          EOF

      - name: Display model info
        run: |
          echo "=== ONNX Models Generated ==="
          python3 << 'EOF'
          import onnx
          from pathlib import Path

          models_dir = Path("src/main/resources/resources/liquidbounce/models")
          for model_file in sorted(models_dir.glob("*.onnx")):
              try:
                  model = onnx.load(str(model_file))
                  ir_version = model.ir_version
                  opset = model.opset_import[0].version if model.opset_import else "unknown"
                  size_mb = model_file.stat().st_size / (1024 * 1024)
                  print(f"{model_file.name}: IR v{ir_version}, opset {opset}, {size_mb:.2f} MB")
              except Exception as e:
                  print(f"{model_file.name}: Error - {e}")
          EOF

      - name: Create ONNX models zip
        run: |
          # Create a clean zip with models/ directory structure
          if ls src/main/resources/resources/liquidbounce/models/*.onnx 1> /dev/null 2>&1; then
            cd src/main/resources/resources/liquidbounce
            zip -r ../../../../../onnx-models.zip models/*.onnx
            cd ../../../../../
            ls -lh onnx-models.zip
          else
            echo "No ONNX models generated"
            exit 1
          fi

      - name: Upload ONNX models zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models-v9-${{ github.run_id }}
          path: onnx-models.zip
          retention-days: 90

      - name: Upload individual ONNX files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onnx-files-v9-${{ github.run_id }}
          path: src/main/resources/resources/liquidbounce/models/*.onnx
          retention-days: 90

      - name: Generate checksum
        run: |
          sha256sum onnx-models.zip > onnx-models.zip.sha256
          cat onnx-models.zip.sha256

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models-v9-${{ github.run_id }}-checksum
          path: onnx-models.zip.sha256
          retention-days: 90
