name: Test Convert Models

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test Python
        run: |
          python --version
          which python
          ls -la convert_models_simple.py
          head -20 convert_models_simple.py
